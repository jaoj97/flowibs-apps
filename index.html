<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOW IBS Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 48px;
            font-size: 0.95rem;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }
        .app-card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
        }
        .app-card:hover {
            border-color: #D9FC67;
            transform: translateY(-2px);
        }
        .app-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        .app-card p {
            font-size: 0.85rem;
            color: #999;
            line-height: 1.5;
        }
        .app-card .arrow {
            display: inline-block;
            margin-top: 16px;
            color: #D9FC67;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>FLOW IBS Apps</h1>
    <p class="subtitle">Herramientas internas</p>
    <div class="apps-grid">
        <a href="/brand-kit-visualizer/" class="app-card">
            <h2>Brand Kit Visualizer</h2>
            <p>Visualiza y previsualiza brand kits completos: paleta de colores, tipografia, botones y mockups.</p>
            <span class="arrow">Abrir &rarr;</span>
        </a>
    </div>
</body>
</html>
